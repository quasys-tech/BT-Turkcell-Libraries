apiVersion: apps/v1
kind: Deployment
metadata:
  name: bt-python-demo-cache-apikey
  namespace: bt-turkcell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bt-python-demo-cache-apikey
  template:
    metadata:
      labels:
        app: bt-python-demo-cache-apikey
    spec:
      containers:
        - name: bt-python-demo-cache-apikey
          image: docker.io/enespekdas/btpython-lib:v1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: bt-python-demo-cache-apikey-secret
