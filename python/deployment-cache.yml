apiVersion: apps/v1
kind: Deployment
metadata:
  name: bt-python-cache-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bt-python-cache-demo
  template:
    metadata:
      labels:
        app: bt-python-cache-demo
    spec:
      containers:
        - name: bt-python-cache-demo
          image: ghcr.io/example/bt-python-demo:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: bt-python-cache-demo-config
            - secretRef:
                name: bt-python-cache-demo-secret
