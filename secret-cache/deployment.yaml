kind: Deployment
apiVersion: apps/v1
metadata:
  name: beyondtrust-secrets-cache
  namespace: bt-turkcell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beyondtrust-secrets-cache
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: beyondtrust-secrets-cache
    spec:
      # --- HostAliases Buraya Ekleniyor ---
      hostAliases:
        - ip: "192.168.2.11"
          hostnames:
            - "pam.quasys.com.tr"
        # ------------------------------------
      containers:
        - name: container
          image: "docker.io/enespekdas/secret-cache:v1.4"
          ports:
            - containerPort: 8443
              protocol: TCP
          envFrom:
            - configMapRef:
                name: beyondtrust-config
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - "-c"
                - netstat -lnt | grep -q ':8443 '
            initialDelaySeconds: 15
            timeoutSeconds: 3
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 6
          volumeMounts:
            - name: btcert-volume
              mountPath: /opt/pbps/server.pem
              subPath: SCACHESERVERCERT
            - name: btcert-volume
              mountPath: /opt/pbps/server.key
              subPath: SCACHESERVERCERTKEY
            - name: btcert-volume
              mountPath: /opt/pbps/password-safe-ca.pem
              subPath: PASSWORDSAFECACERT
          resources:
            limits:
              cpu: 50m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: Always
      volumes:
        - name: btcert-volume
          configMap:
            name: beyondtrust-config
            defaultMode: 420
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
