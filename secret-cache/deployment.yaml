kind: Deployment
apiVersion: apps/v1
metadata:
  name: beyondtrust-secrets-cache
  namespace: beyondtrust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beyondtrust-secrets-cache
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: beyondtrust-secrets-cache
    spec:
      # nodeSelector:
      #   node-role.kubernetes.io/infra: ""
      containers:
        - name: container
          image: 'shield07/btsecretcache:0.1.6'
          ports:
            - containerPort: 8443
              protocol: TCP
          envFrom:
            - configMapRef:
                name: beyondtrust-config
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - '-c'
                - grep -q 'Sync complete' /var/opt/pbps/log/pspca.log
            initialDelaySeconds: 15
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          volumeMounts:
            - name: btcert-volume
              mountPath: /opt/pbps/server.pem
              subPath: SCACHESERVERCERT
            - name: btcert-volume
              mountPath: /opt/pbps/server.key
              subPath: SCACHESERVERCERTKEY
          resources:
            limits:
              cpu: 50m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      volumes:
        - name: btcert-volume
          configMap:
            name: beyondtrust-config
            defaultMode: 420
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
